name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 🍎 macOS: agregar target Intel para Universal Binary
      - name: Add macOS Intel target
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      # 🍎 macOS: compilar Universal Binary (Intel + Apple Silicon)
      - name: Build Tauri app (macOS Universal)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- --target universal-apple-darwin

      # 🪟 Windows: compilar normal
      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # 🍎 macOS: subir DMG universal
      - name: Upload macOS DMG
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer-${{ steps.version.outputs.VERSION }}
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload Windows MSI
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.version.outputs.VERSION }}
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ steps.version.outputs.VERSION }}
          path: ./installers/windows

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-installer-${{ steps.version.outputs.VERSION }}
          path: ./installers/macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./installers/windows/*.msi
            ./installers/macos/*.dmg
          body: |
            ## 🎉 Sistema POS Ropa v${{ steps.version.outputs.VERSION }}
            
            ### 📦 Instaladores disponibles:
            
            **Windows:**
            - `.msi` - Instalador para Windows
            
            **macOS (Universal - Intel + Apple Silicon):**
            - `.dmg` - Funciona en MacBook Intel y MacBook M1/M2/M3
            
            ---
            
            ### 🚀 Cómo instalar:
            
            #### Windows:
            1. Descargar el archivo `.msi`
            2. Doble click en el instalador
            3. Seguir las instrucciones
            4. Los datos se guardarán en `%APPDATA%\Sistema POS Ropa\`
            
            #### macOS:
            1. Descargar el archivo `.dmg`
            2. Abrir el archivo descargado
            3. Arrastrar la aplicación a Aplicaciones
            4. Los datos se guardarán en `~/Library/Application Support/Sistema POS Ropa/`
            
            ---
            
            ### 🔄 Actualización desde versión anterior:
            
            **Windows**: El instalador detectará automáticamente la versión anterior
            - Tus datos se preservarán automáticamente
            
            **macOS**: Simplemente reemplaza la app en la carpeta Aplicaciones
            - Los datos permanecen intactos en `Application Support`
            
            ---
            
            ### ⚠️ Notas importantes:
            
            - **Primera instalación**: Incluye 15 días de licencia Trial
            - **Actualización**: Tus datos se preservan automáticamente
            - **macOS Universal**: Compatible con Intel y Apple Silicon (M1/M2/M3)
            
            ---
            
            **¡Gracias por usar Sistema POS Ropa!** 🎉

          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}